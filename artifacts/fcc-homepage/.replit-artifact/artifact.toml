kind = "web"
previewPath = "/"
title = "Founders' Circle Connect"
version = "1.0.0"
id = "artifacts/fcc-homepage"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19755

[services.development]
run = "pnpm --filter @workspace/fcc-homepage run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fcc-homepage", "run", "build" ]
publicDir = "artifacts/fcc-homepage/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19755"
BASE_PATH = "/"
